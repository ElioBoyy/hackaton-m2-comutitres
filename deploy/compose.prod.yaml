# Compose de PRODUCTION — deployé via Coolify (Docker Compose mode).
#
# Coolify clone le repo, build les images sur place, et gère le reverse proxy
# Traefik (HTTPS, domaines). Les ports 8080/3000 ne sont PAS exposés sur l'hôte :
# Coolify route le trafic vers les containers via le réseau interne.
#
# Variables à renseigner dans l'UI Coolify (onglet Environment) :
#   POSTGRES_DB, POSTGRES_USER, POSTGRES_PASSWORD
#   MINIO_ROOT_USER, MINIO_ROOT_PASSWORD
#   FRONTEND_ORIGIN      -> https://jgmcn.mtsrt.fr
#   APP_SECURITY_JWT_SECRET
#   VOYAGE_API_KEY
#   MISTRAL_API_KEY
#   RESEND_API_KEY
#   RESEND_FROM_EMAIL    -> l'adresse expéditrice configurée dans Resend

services:
  postgres:
    image: pgvector/pgvector:pg17
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "mc ready local || curl -fsS http://localhost:9000/minio/health/ready"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      # Profil "docker" : désactive spring.docker.compose (inutile en container).
      SPRING_PROFILES_ACTIVE: docker,seed
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      APP_CORS_ALLOWED_ORIGINS: ${FRONTEND_ORIGIN}
      APP_STORAGE_ENDPOINT: http://minio:9000
      APP_STORAGE_ACCESS_KEY: ${MINIO_ROOT_USER}
      APP_STORAGE_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      APP_SECURITY_JWT_SECRET: ${APP_SECURITY_JWT_SECRET}
      RAG_INGESTION_AU_DEMARRAGE: "true"
      VOYAGE_API_KEY: ${VOYAGE_API_KEY}
      MISTRAL_API_KEY: ${MISTRAL_API_KEY}
      RESEND_API_KEY: ${RESEND_API_KEY}
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL}
      INFOBIP_API_KEY: ${INFOBIP_API_KEY}
      INFOBIP_BASE_URL: ${INFOBIP_BASE_URL}
      INFOBIP_2FA_APPLICATION_ID: ${INFOBIP_2FA_APPLICATION_ID}
      INFOBIP_2FA_MESSAGE_ID: ${INFOBIP_2FA_MESSAGE_ID}
      INFOBIP_2FA_FROM: ${INFOBIP_2FA_FROM}
    expose:
      - "8080"

  frontend:
    build:
      context: frontend
      args:
        # VITE_API_URL est bakée dans le bundle au moment du build (Vite).
        VITE_API_URL: https://api-jgmcn.mathistassart.fr
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      PORT: 3000
    expose:
      - "3000"

