# Compose de PRODUCTION (sur le VPS).
#
# A placer dans un dossier sur le VPS (ex: /opt/jegeremacartenavigo/) avec un
# fichier .env a cote (voir .env.prod.example). La CI fait, par service :
#   docker compose pull <service> && docker compose up -d <service>
# => un deploy backend ne redemarre que `backend`, idem pour `frontend`.
#
# Les images sont tirees de GHCR. BACKEND_IMAGE / FRONTEND_IMAGE incluent le tag
# (ex: ghcr.io/elioboyy/hackaton-backend:sha-abc123), pousse par la CI.

services:
  postgres:
    image: pgvector/pgvector:pg17
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    image: ${BACKEND_IMAGE}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      # Origines CORS autorisees (liste separee par des virgules -> List<String>).
      APP_CORS_ALLOWED_ORIGINS: ${FRONTEND_ORIGIN}
    ports:
      - "8080:8080"

  frontend:
    image: ${FRONTEND_IMAGE}
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      PORT: 3000
    ports:
      - "3000:3000"

volumes:
  pg-data:
