# Stack complete (postgres + backend) en containers, sans rien installer en
# local (pas besoin de Java/Maven sur la machine).
#
# Usage : docker compose -f compose.full.yaml up --build
#
# Ne pas confondre avec compose.yaml : ce dernier (postgres seul) est celui
# que Spring Boot lance lui-meme via spring.docker.compose quand on demarre
# l'app en local (mvn spring-boot:run / IDE). Le dupliquer ici evite que
# spring.docker.compose ne tente de (re)lancer le backend depuis lui-meme.
services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: jegeremacartenavigo
      POSTGRES_USER: jgmcn
      POSTGRES_PASSWORD: jgmcn
    ports:
      - "5434:5432"
    volumes:
      - jegeremacartenavigo-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jgmcn -d jegeremacartenavigo"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: jgmcn
      MINIO_ROOT_PASSWORD: jgmcnjgmcn
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - jegeremacartenavigo-minio-data:/data
    healthcheck:
      test: ["CMD-SHELL", "mc ready local || curl -fsS http://localhost:9000/minio/health/ready"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: .
    environment:
      SPRING_PROFILES_ACTIVE: docker
      # Le backend resout 'minio' via le DNS du reseau compose.
      APP_STORAGE_ENDPOINT: http://minio:9000
      APP_STORAGE_ACCESS_KEY: jgmcn
      APP_STORAGE_SECRET_KEY: jgmcnjgmcn
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy

volumes:
  jegeremacartenavigo-pg-data:
  jegeremacartenavigo-minio-data:
