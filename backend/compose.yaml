services:
  postgres:
    # Image pgvector (Postgres 17 + extension vector), requise pour le RAG.
    # Compatible avec un volume cree par postgres:17 (meme version majeure 17).
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: jegeremacartenavigo
      POSTGRES_USER: jgmcn
      POSTGRES_PASSWORD: jgmcn
    # Port hote 5434 (5432/5433 sont deja pris sur ce poste par d'autres projets).
    # Pour revenir au standard : mettre "5432:5432" ici ET adapter spring.datasource.url.
    ports:
      - "5434:5432"
    volumes:
      - jegeremacartenavigo-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jgmcn -d jegeremacartenavigo"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    # Stockage S3-compatible pour les pieces justificatives (CNI, certificat de
    # scolarite, notif bourse). Bucket prive cree au demarrage par le backend
    # (cf. MinioConfig). Console web sur http://localhost:9001 (login jgmcn /
    # jgmcnjgmcn) pour inspecter les objets en dev.
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: jgmcn
      MINIO_ROOT_PASSWORD: jgmcnjgmcn
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - jegeremacartenavigo-minio-data:/data
    healthcheck:
      test: ["CMD-SHELL", "mc ready local || curl -fsS http://localhost:9000/minio/health/ready"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  jegeremacartenavigo-pg-data:
  jegeremacartenavigo-minio-data:
