spring:
  application:
    name: jegeremacartenavigo-backend

  # Charge backend/.env (format .properties : CLE=valeur) s'il existe. 'optional'
  # => pas d'echec si absent (ex: en prod, les cles viennent de l'environnement).
  # Deux emplacements car le CWD differe : '.env' quand on lance le jar depuis
  # backend/, '../.env' quand mvn spring-boot:run tourne depuis backend/bootstrap/.
  config:
    import:
      - optional:file:.env[.properties]
      - optional:file:../.env[.properties]

  # --- Persistance : PostgreSQL ---
  # Ces valeurs servent quand vous pointez vers une base externe. En dev, le
  # support docker-compose ci-dessous demarre Postgres et surcharge la datasource.
  datasource:
    # Port 5434 cote hote (cf. compose.yaml : 5432/5433 deja utilises sur ce poste).
    url: jdbc:postgresql://localhost:5434/jegeremacartenavigo
    username: jgmcn
    password: jgmcn
  jpa:
    open-in-view: false
    hibernate:
      # Le schema est pilote par Flyway (cf. spring.flyway). Hibernate ne fait que
      # valider que les entites correspondent aux tables migrees, il ne les cree pas.
      ddl-auto: validate

    properties:
      hibernate:
        format_sql: true

  # --- Migrations de schema : Flyway ---
  # Scripts dans infrastructure/src/main/resources/db/migration (V<n>__<desc>.sql).
  # Joues automatiquement au demarrage, dans l'ordre des versions.
  flyway:
    enabled: true
    locations: classpath:db/migration
    ignore-migration-patterns: "*:missing"

  # --- Docker Compose (dev) ---
  # Au demarrage, Spring Boot lance compose.yaml (situe a la racine backend) et
  # cable automatiquement la datasource sur le conteneur Postgres.
  docker:
    compose:
      enabled: true
      file: ../compose.yaml
      lifecycle-management: start-and-stop

  # Limites de l'upload multipart (cf. FichierController). 10 Mo par fichier,
  # 12 Mo par requete - on uploade un seul justificatif a la fois.
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 12MB

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info

# --- CORS (consomme par CorsProperties) ---
app:
  cors:
    allowed-origins:
      - http://localhost:3000 # TanStack Start (dev)
      - http://localhost:5173 # Vite (port par defaut, au cas ou)
      - http://10.102.111.55:3000 # acces depuis telephone sur le reseau local
    allowed-methods:
      - GET
      - POST
      - PUT
      - PATCH
      - DELETE
      - OPTIONS
    allowed-headers:
      - "*"
    # L'auth passe par l'en-tete Authorization (Bearer), pas par cookie -> pas
    # besoin d'allow-credentials cote CORS.
    allow-credentials: false
  # --- JWT (HS256). Le secret doit faire >= 32 octets UTF-8 (256 bits).
  # En prod : surcharger via la variable d'env APP_SECURITY_JWT_SECRET.
  security:
    jwt:
      secret: ${APP_SECURITY_JWT_SECRET:dev-secret-please-override-32-bytes-min-1234567890}
      issuer: jegeremacartenavigo
      expires-minutes: 1440

  # --- Stockage des pieces justificatives (MinIO en dev, S3-compatible en prod).
  # Le bucket est cree au demarrage par MinioConfig (idempotent) et reste prive ;
  # les pieces ne sont accessibles que via des URLs pre-signees emises par le
  # backend (cf. FichierController).
  storage:
    endpoint: ${APP_STORAGE_ENDPOINT:http://localhost:9000}
    access-key: ${APP_STORAGE_ACCESS_KEY:jgmcn}
    secret-key: ${APP_STORAGE_SECRET_KEY:jgmcnjgmcn}
    bucket: ${APP_STORAGE_BUCKET:jegeremacartenavigo-pieces}
    region: ${APP_STORAGE_REGION:us-east-1}

# --- RAG (consomme par RagProperties, prefixe rag.*) ---
rag:
  ingestion-au-demarrage: true
  # Source du corpus a ingerer. Par defaut le classpath (corpus embarque dans le
  # jar => ingestion reproductible en CI/prod). Surchargeable par un chemin
  # fichier, ex: file:../frontend/RAG_context/cartographie-navigo
  corpus:
    location: classpath:rag-corpus/
  voyage:
    api-key: ${VOYAGE_API_KEY:}
    base-url: https://api.voyageai.com/v1
    embedding-model: voyage-4
    dimensions: 1024
    # Taille d'un lot d'embeddings : tous les fragments du corpus sont vectorises
    # en quelques appels (et non un appel par document). 128 reste large sous les
    # limites Voyage (entrees/tokens par requete).
    batch-size: 128
  mistral:
    api-key: ${MISTRAL_API_KEY:}
    base-url: https://api.mistral.ai/v1
    model: mistral-small-latest
    temperature: 0.2
    max-tokens: 1024
  retrieval:
    # Nombre de fragments candidats remontes par la recherche vectorielle.
    top-k: 6
    # Pipeline 1 (anti-hors-sujet) : si le MEILLEUR passage est sous ce seuil, la
    # question est jugee hors perimetre Navigo -> refus "hors sujet".
    seuil-hors-sujet: 0.35
    # Pipeline 2 (anti-hallucination) : similarite minimale d'un passage pour etre
    # juge assez fiable pour fonder une reponse.
    seuil-similarite: 0.45
    # Nombre minimal de fragments au-dessus du seuil pour repondre.
    min-fragments-pertinents: 1
  decoupe:
    # Taille cible d'un fragment et chevauchement, en caracteres (approximation).
    taille-cible: 1200
    chevauchement: 200

# --- Resend (envoi d'emails transactionnels) ---
# Notifications de changement de statut dossier au porteur. Si api-key est
# vide, l'envoi est un no-op silencieux (warn logge), aucune transition n'est
# bloquee. Cf. ResendNotificateurDossierAdapter.
resend:
  api-key: ${RESEND_API_KEY:}
  from-email: ${RESEND_FROM_EMAIL:noreply@comutitres.fr}
  from-name: ${RESEND_FROM_NAME:Comutitres}

logging:
  level:
    fr.jegeremacartenavigo: DEBUG
