name: Frontend

# Ne se declenche que pour des changements frontend (+ ce workflow lui-meme).
on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/frontend.yml"
  pull_request:
    paths:
      - "frontend/**"
      - ".github/workflows/frontend.yml"

concurrency:
  group: frontend-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/hackaton-frontend

jobs:
  # --- Build (typecheck inclus via le script build) : sur PR et push ---
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Build (vite build + tsc --noEmit)
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

  # --- Build image + push GHCR + deploy : uniquement push sur main ---
  # EN SOMMEIL tant que la variable repo DEPLOY_ENABLED != 'true'.
  # Le jour ou le VPS est pret : Settings > Variables > DEPLOY_ENABLED=true
  # + renseigner les secrets (VPS_HOST, VPS_USER, VPS_SSH_KEY, GHCR_PAT, DEPLOY_DIR, VITE_API_URL).
  deploy:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && vars.DEPLOY_ENABLED == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Nom d'image en minuscules
        id: img
        run: echo "ref=$(echo '${{ env.IMAGE }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: frontend
          push: true
          # VITE_API_URL est inline au BUILD par Vite : on le passe en build-arg.
          build-args: |
            VITE_API_URL=${{ secrets.VITE_API_URL }}
          tags: |
            ${{ steps.img.outputs.ref }}:latest
            ${{ steps.img.outputs.ref }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy (SSH)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -e
            cd "${{ secrets.DEPLOY_DIR }}"
            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
            IMAGE="${{ steps.img.outputs.ref }}:${{ github.sha }}"
            sed -i "s|^FRONTEND_IMAGE=.*|FRONTEND_IMAGE=$IMAGE|" .env
            docker compose pull frontend
            docker compose up -d frontend
            docker image prune -f
